name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.10'

      - name: Run unit tests (orc)
        run: nimble test -y

      - name: Run unit tests (refc)
        run: nim c -r --hints:off --mm:refc tests/test_schematic.nim

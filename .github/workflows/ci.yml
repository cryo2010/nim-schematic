name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mm: [arc, orc]
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.10'

      - name: Install dependencies
        run: nimble install -dy

      - name: Build library (${{ matrix.mm }})
        run: nim c --hints:off --mm:${{ matrix.mm }} src/schematic.nim

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.10'

      - name: Run unit tests (orc)
        run: nimble test -y

      - name: Run unit tests (refc)
        run: nim c -r --hints:off --mm:refc tests/test_schematic.nim

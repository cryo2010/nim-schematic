# Project-wide: the reference prototype requires Nim's `--mm:refc`.
# Nim 2.2.x's ORC memory manager miscompiles the deeply-nested generic closures
# the library builds (SIGSEGV at run time). refc and markAndSweep are correct.
# See DESIGN.md, "Known limitation: ORC memory manager".
--mm:refc
--path:"src"
